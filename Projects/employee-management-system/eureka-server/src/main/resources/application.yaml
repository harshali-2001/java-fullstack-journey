server:
  port: 8761

spring:
  application:
    name: eureka-server

eureka:
  client:
    register-with-eureka: false
    fetch-registry: false
  server:
    enable-self-preservation: false


# why register-with-eureka: false
#    cause the erureka server itslef doesnt need to register as a client of itself
#    this line prevents it from tying to
#    this is genuinely common interview this

